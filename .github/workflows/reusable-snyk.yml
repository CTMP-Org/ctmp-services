name: "Reusable Snyk Scan"

on:
  workflow_call:
    inputs:
      scan-type:
        required: true
        type: string # 'code', 'iac', or 'container'
      target:
        required: false
        type: string
        default: "."
      acr-name:
        required: false
        type: string
        default: "ctmp3acr"
    secrets:
      SNYK_TOKEN:
        required: true
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        if: inputs.scan-type == 'container' && env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        if: inputs.scan-type == 'container' && env.AZURE_CLIENT_ID != ''
        run: az acr login --name ${{ inputs.acr-name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ "${{ inputs.scan-type }}" = "iac" ]; then
            snyk iac test --report --severity-threshold=high ${{ inputs.target }}
          elif [ "${{ inputs.scan-type }}" = "container" ]; then
            snyk container test --severity-threshold=high ${{ inputs.target }}
            snyk container monitor ${{ inputs.target }} || true
          else
            # Default to open source / code test (use --all-projects for monorepos)
            snyk test --all-projects --skip-unresolved --severity-threshold=high ${{ inputs.target }}
            snyk monitor --all-projects --skip-unresolved ${{ inputs.target }} || true
          fi

