name: "Build, Push & Scan Microservices"

on:
  push:
    branches: [main, dev]
    paths:
      - 'services/**'
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

env:
  ACR_NAME: ctmp3acr
  ACR_LOGIN_SERVER: ctmp3acr.azurecr.io

jobs:
  detect-changes:
    name: "Detect Changed Services"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      auth-service: ${{ steps.filter.outputs.auth-service }}
      admin-service: ${{ steps.filter.outputs.admin-service }}
      trainer-service: ${{ steps.filter.outputs.trainer-service }}
      student-service: ${{ steps.filter.outputs.student-service }}
      billing-service: ${{ steps.filter.outputs.billing-service }}
      analytics-service: ${{ steps.filter.outputs.analytics-service }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            admin-service:
              - 'services/admin-service/**'
            trainer-service:
              - 'services/trainer-service/**'
            student-service:
              - 'services/student-service/**'
            billing-service:
              - 'services/billing-service/**'
            analytics-service:
              - 'services/analytics-service/**'
            frontend:
              - 'frontend/**'

      - name: Generate Matrix Output
        id: set-matrix
        run: |
          SERVICES=()
          if [ "${{ steps.filter.outputs.auth-service }}" = "true" ]; then SERVICES+=("auth-service"); fi
          if [ "${{ steps.filter.outputs.admin-service }}" = "true" ]; then SERVICES+=("admin-service"); fi
          if [ "${{ steps.filter.outputs.trainer-service }}" = "true" ]; then SERVICES+=("trainer-service"); fi
          if [ "${{ steps.filter.outputs.student-service }}" = "true" ]; then SERVICES+=("student-service"); fi
          if [ "${{ steps.filter.outputs.billing-service }}" = "true" ]; then SERVICES+=("billing-service"); fi
          if [ "${{ steps.filter.outputs.analytics-service }}" = "true" ]; then SERVICES+=("analytics-service"); fi
          if [ "${{ steps.filter.outputs.frontend }}" = "true" ]; then SERVICES+=("frontend"); fi
          
          # Convert array to JSON
          JSON_ARRAY=$(jq --compact-output --null-input '$ARGS.positional' --args "${SERVICES[@]}")
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "Detected changed services: $JSON_ARRAY"

  sonar-scan:
    name: "SonarQube Scan"
    uses: ./.github/workflows/reusable-sonar.yml
    with:
      project-key: "ctmp-services"
      project-name: "CTMP Services"
    secrets: inherit

  snyk-code-scan:
    name: "Snyk Code Scan"
    uses: ./.github/workflows/reusable-snyk.yml
    with:
      scan-type: "code"
    secrets: inherit

  build-services:
    name: "Build ${{ matrix.service }}"
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Version
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "VERSION=0.${{ github.run_number }}.0" >> $GITHUB_ENV
          else
            echo "VERSION=0.0.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Whitelist IP in ACR
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org | tr -d '\r')
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          echo "Adding firewall rule for IP $RUNNER_IP on ACR ${{ env.ACR_NAME }}..."
          az acr network-rule add --name ${{ env.ACR_NAME }} --ip-address "$RUNNER_IP"
          # Sleep to allow rule propagation
          sleep 45

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'frontend' && './frontend' || format('./services/{0}', matrix.service) }}
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_AZURE_AD_CLIENT_ID=${{ secrets.NEXT_PUBLIC_AZURE_AD_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
            NEXT_PUBLIC_AZURE_AD_TENANT_ID=${{ secrets.NEXT_PUBLIC_AZURE_AD_TENANT_ID || secrets.AZURE_TENANT_ID }}
            NEXT_PUBLIC_REDIRECT_URI=https://training.sneakertail.online
            NEXT_PUBLIC_API_URL=https://api.training.sneakertail.online

      - name: Remove IP from ACR Whitelist
        if: always() && env.RUNNER_IP != ''
        run: |
          echo "Removing firewall rule for IP ${{ env.RUNNER_IP }} from ACR ${{ env.ACR_NAME }}..."
          az acr network-rule remove --name ${{ env.ACR_NAME }} --ip-address "${{ env.RUNNER_IP }}"

  trivy-container-scan:
    name: "Trivy Scan: ${{ matrix.service }}"
    needs: [detect-changes, build-services]
    if: needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: ./.github/workflows/reusable-trivy.yml
    with:
      scan-type: "image"
      scan-target: "ctmp3acr.azurecr.io/${{ matrix.service }}:${{ github.sha }}"
      acr-name: "ctmp3acr"
    secrets: inherit

  snyk-container-scan:
    name: "Snyk Scan: ${{ matrix.service }}"
    needs: [detect-changes, build-services]
    if: needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: ./.github/workflows/reusable-snyk.yml
    with:
      scan-type: "container"
      target: "ctmp3acr.azurecr.io/${{ matrix.service }}:${{ github.sha }}"
      acr-name: "ctmp3acr"
    secrets: inherit

  update-gitops:
    name: "Update GitOps Image Tags"
    needs: [detect-changes, build-services, trivy-container-scan, snyk-container-scan]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: CTMP-Org/ctmp-gitops
          token: ${{ secrets.GITOPS_REPO_PAT }}
          ref: ${{ github.ref_name }}
          path: ctmp-gitops-repo

      - name: Determine Environment Settings
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "VERSION=0.${{ github.run_number }}.0" >> $GITHUB_ENV
            echo "VALUES_FILE=values-prod.yaml" >> $GITHUB_ENV
          else
            echo "VERSION=0.0.${{ github.run_number }}" >> $GITHUB_ENV
            echo "VALUES_FILE=values-dev.yaml" >> $GITHUB_ENV
          fi

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update changed service tags
        run: |
          IMAGE_TAG="${{ env.VERSION }}"
          export IMAGE_TAG

          update_tag() {
            service="$1"
            changed="$2"
            if [ "$changed" = "true" ]; then
              yq -i '.image.tag = strenv(IMAGE_TAG)' "ctmp-gitops-repo/manifests/${service}/${{ env.VALUES_FILE }}"
            fi
          }

          update_tag "auth-service" "${{ needs.detect-changes.outputs.auth-service }}"
          update_tag "admin-service" "${{ needs.detect-changes.outputs.admin-service }}"
          update_tag "trainer-service" "${{ needs.detect-changes.outputs.trainer-service }}"
          update_tag "student-service" "${{ needs.detect-changes.outputs.student-service }}"
          update_tag "billing-service" "${{ needs.detect-changes.outputs.billing-service }}"
          update_tag "analytics-service" "${{ needs.detect-changes.outputs.analytics-service }}"
          update_tag "frontend" "${{ needs.detect-changes.outputs.frontend }}"

      - name: Commit GitOps image tags
        run: |
          cd ctmp-gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/*/values-dev.yaml manifests/*/values-prod.yaml
          if git diff --cached --quiet; then
            echo "No GitOps image tag changes to commit."
          else
            git commit -m "Update image tags to ${{ env.VERSION }} (${{ github.ref_name }})"
            git push origin ${{ github.ref_name }}
          fi
